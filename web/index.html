<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="صوتك - SAWTAK Voice Chat">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="صوتك">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>صوتك - SAWTAK</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/main.css">

  <style>
    /* App shell */
    body { margin: 0; background: #08080F; overflow: hidden; }
    #app {
      width: 100%; height: 100vh;
      max-width: 430px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      background: #08080F;
      box-shadow: 0 0 80px rgba(123,47,190,0.15);
    }
    #screen-container {
      width: 100%; height: 100%;
      overflow-y: auto; overflow-x: hidden;
      scrollbar-width: none; -ms-overflow-style: none;
    }
    #screen-container::-webkit-scrollbar { display: none; }
    .has-bottom-nav #screen-container { height: calc(100% - 72px); }
    #bottom-nav { position: absolute; bottom: 0; left: 0; right: 0; }
    #bottom-nav.hidden { display: none; }
    #modal-overlay { position: absolute; inset: 0; z-index: 200; display: flex; align-items: flex-end; }
    #modal-overlay.hidden { display: none; }
    #toast-container {
      position: absolute;
      bottom: 88px; left: 50%; transform: translateX(-50%);
      z-index: 500; display: flex; flex-direction: column; gap: 8px;
      align-items: center; pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="screen-container"></div>
    <div id="bottom-nav" class="bottom-nav hidden"></div>
    <div id="modal-overlay" class="hidden"></div>
    <div id="toast-container"></div>
  </div>

  <!-- Data -->
  <script src="js/data.js"></script>

  <!-- Animation Engine -->
  <script src="js/animations.js"></script>

  <!-- Screens -->
  <script src="js/screens/splash.js"></script>
  <script src="js/screens/auth.js"></script>
  <script src="js/screens/home.js"></script>
  <script src="js/screens/room.js"></script>
  <script src="js/screens/vip.js"></script>
  <script src="js/screens/store.js"></script>
  <script src="js/screens/games.js"></script>
  <script src="js/screens/profile.js"></script>
  <script src="js/screens/agencies.js"></script>
  <script src="js/screens/admin.js"></script>
  <script src="js/screens/search.js"></script>
  <script src="js/screens/messages.js"></script>
  <script src="js/screens/notifications.js"></script>

  <!-- App Router -->
  <script src="js/app.js"></script>
</body>
</html>
